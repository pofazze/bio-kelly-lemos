<style>
  :root {
    --bg: #14100c;
    --bg-2: #1c1611;
    --bg-3: #261c14;
    --brown: #3a2a1c;
    --brown-mid: #4d3624;
    --caramel-deep: #6b4a30;
    --caramel: #b8804a;
    --caramel-light: #d4a373;
    --gold: #c89263;
    --gold-soft: #b88958;
    --beige: #e8d4b8;
    --beige-warm: #f0dcc1;
    --beige-soft: #d4bd9e;
    --line: rgba(232, 212, 184, 0.14);
    --line-strong: rgba(232, 212, 184, 0.28);
    --display: 'Italiana', 'Cormorant Garamond', 'Times New Roman', serif;
    --label: 'Tenor Sans', 'Inter', system-ui, sans-serif;
    --serif-it: 'Cormorant Garamond', 'Times New Roman', serif;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--beige-warm);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
    text-rendering: optimizeLegibility;
  }

  /* HERO — foto full-bleed no topo */
  .hero {
    position: relative;
    width: 100%;
    height: 78vh;
    min-height: 540px;
    max-height: 820px;
    overflow: hidden;
    background: var(--bg);
    margin-bottom: -22vh;
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 45% 18%;
    display: block;
  }

  /* Gradiente: começa transparente no topo, vira marrom escuro embaixo */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        rgba(20, 16, 12, 0) 0%,
        rgba(20, 16, 12, 0) 35%,
        rgba(20, 16, 12, 0.15) 50%,
        rgba(28, 22, 17, 0.55) 70%,
        rgba(20, 16, 12, 0.92) 88%,
        var(--bg) 100%
      );
    pointer-events: none;
  }

  /* Top accent: subtle vignette + warm glow at bottom */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% 100%, rgba(184, 128, 74, 0.22), transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* Top monogram floating over photo */
  .top-mark {
    position: absolute;
    top: calc(var(--safe-top) + 22px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-family: var(--label);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.42em;
    color: var(--beige-warm);
    text-transform: uppercase;
    padding-left: 0.42em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    opacity: 0;
    animation: fadeIn 0.9s 0.2s ease-out forwards;
  }

  .top-mark::before,
  .top-mark::after {
    content: '';
    display: inline-block;
    width: 16px;
    height: 1px;
    background: var(--gold);
    vertical-align: middle;
    margin: 0 10px;
    opacity: 0.7;
  }

  /* Content over the gradient */
  .content {
    position: relative;
    z-index: 3;
    padding: 0 22px calc(var(--safe-bottom) + 36px);
    max-width: 460px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .name {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(34px, 9vw, 44px);
    letter-spacing: 0.04em;
    color: var(--beige-warm);
    line-height: 1;
    opacity: 0;
    animation: fadeUp 1s 0.4s ease-out forwards;
  }

  .role {
    margin-top: 10px;
    font-size: 10.5px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
    padding-left: 0.42em;
    opacity: 0;
    animation: fadeUp 1s 0.5s ease-out forwards;
  }

  /* Headline */
  .headline {
    font-family: var(--display);
    font-weight: 400;
    max-width: 300px;
    text-align: center;
    margin: 0 auto;
    opacity: 0;
    animation: fadeUp 1s 0.4s ease-out forwards;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .headline-main {
    display: block;
    font-size: clamp(20px, 5.4vw, 24px);
    line-height: 1.25;
    color: var(--gold);
    letter-spacing: 0.03em;
  }

  .headline-sub {
    display: block;
    font-family: var(--serif-it);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(14px, 3.8vw, 16px);
    line-height: 1.45;
    color: var(--beige-soft);
    letter-spacing: 0.01em;
    opacity: 0.78;
  }

  /* Decorative diamond divider */
  .ornament {
    margin: 26px 0 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: 100%;
    max-width: 240px;
    opacity: 0;
    animation: fadeUp 1s 0.7s ease-out forwards;
  }

  .ornament .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0.55;
  }

  .ornament .diamond {
    width: 8px;
    height: 8px;
    transform: rotate(45deg);
    background: var(--gold);
    flex-shrink: 0;
    box-shadow: 0 0 10px rgba(200, 146, 99, 0.4);
  }

  /* Buttons */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-height: 64px;
    padding: 16px 22px;
    background:
      linear-gradient(135deg,
        rgba(184, 128, 74, 0.16) 0%,
        rgba(74, 50, 32, 0.55) 50%,
        rgba(40, 28, 18, 0.7) 100%);
    border: 1px solid rgba(200, 146, 99, 0.28);
    border-radius: 14px;
    color: var(--beige-warm);
    text-decoration: none;
    transition:
      transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1),
      border-color 0.35s ease,
      box-shadow 0.35s ease;
    position: relative;
    overflow: hidden;
    text-align: center;
    box-shadow:
      inset 0 1px 0 rgba(232, 212, 184, 0.08),
      0 4px 20px -8px rgba(0, 0, 0, 0.6);
    opacity: 0;
    transform: translateY(18px);
    animation: fadeUp 0.9s ease-out forwards;
  }

  .link-btn:nth-of-type(1) { animation-delay: 0.85s; }
  .link-btn:nth-of-type(2) { animation-delay: 0.95s; }
  .link-btn:nth-of-type(3) { animation-delay: 1.05s; }

  .link-btn::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .link-btn:active {
    transform: scale(0.985);
    border-color: rgba(200, 146, 99, 0.55);
  }
  .link-btn:active::before { opacity: 1; }

  @media (hover: hover) and (pointer: fine) {
    .link-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(200, 146, 99, 0.5);
      box-shadow:
        inset 0 1px 0 rgba(232, 212, 184, 0.12),
        0 16px 32px -16px rgba(0, 0, 0, 0.7);
    }
    .link-btn:hover::before { opacity: 1; }
  }

  .icon-wrap {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
  }

  .icon-wrap svg {
    width: 22px;
    height: 22px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.4;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .link-title {
    display: block;
    font-family: var(--label);
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--beige-warm);
    line-height: 1.2;
    padding-left: 0.22em;
  }

  /* Final CTA — destaque */
  .final-cta {
    margin-top: 6px;
    background:
      linear-gradient(135deg,
        rgba(200, 146, 99, 0.24) 0%,
        rgba(184, 128, 74, 0.34) 100%);
    border-color: rgba(212, 163, 115, 0.5);
  }
  .final-cta .icon-wrap { color: var(--beige-warm); }
  .final-cta .link-title { color: var(--beige-warm); letter-spacing: 0.22em; }

  /* Footer */
  .footer {
    margin-top: 28px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 0.9s 1.3s ease-out forwards;
  }

  .insta-link {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    color: var(--beige-soft);
    text-decoration: none;
    font-family: var(--label);
    font-size: 12px;
    letter-spacing: 0.22em;
    transition: color 0.3s ease;
    padding: 6px 4px;
    padding-left: 0.22em;
  }

  .insta-link:active { color: var(--gold); }
  @media (hover: hover) and (pointer: fine) {
    .insta-link:hover { color: var(--gold); }
  }

  .insta-link svg {
    width: 15px;
    height: 15px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }

  .signature {
    font-family: var(--display);
    font-size: 14px;
    color: var(--beige-soft);
    opacity: 0.6;
    letter-spacing: 0.06em;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Tablet+ */
  @media (min-width: 520px) {
    .hero { height: 80vh; max-height: 880px; margin-bottom: -24vh; }
    .content { padding: 0 28px calc(var(--safe-bottom) + 48px); }
    .link-btn { min-height: 84px; padding: 18px 22px; }
  }

  /* Phones pequenos */
  @media (max-width: 360px) {
    .hero { height: 72vh; min-height: 480px; margin-bottom: -20vh; }
    .content { padding: 0 18px calc(var(--safe-bottom) + 32px); }
    .links { gap: 10px; }
    .link-btn { min-height: 60px; padding: 14px 18px; gap: 10px; }
    .link-title { font-size: 12px; letter-spacing: 0.18em; }
    .icon-wrap, .icon-wrap svg { width: 20px; height: 20px; }
    .headline { max-width: 260px; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
